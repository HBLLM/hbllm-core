name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  python-lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Type check with mypy
      run: |
        mypy hbllm/
        
    - name: Run tests with pytest
      run: |
        pytest tests/ -v

  rust-lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          rust/compute_kernel -> target
          
    - name: Check Formatting
      run: cargo fmt --manifest-path rust/compute_kernel/Cargo.toml -- --check
      
    - name: Check with Clippy
      run: cargo clippy --manifest-path rust/compute_kernel/Cargo.toml --workspace -- -D warnings
      
    - name: Compile Compute Kernel
      run: cargo check --manifest-path rust/compute_kernel/Cargo.toml
