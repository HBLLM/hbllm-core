site_name: HBLLM Core — Your Sovereign Personal AI
site_description: >-
  A highly personalized, multi-tenant AI ecosystem that runs entirely on your own hardware.
  35+ cognitive nodes, multi-tiered memory, Rust SIMD inference, and dynamic LoRA routing 
  for absolute privacy and digital sovereignty.
site_author: HBLLM Team
site_url: https://hbllm.github.io/hbllm-core/
repo_url: https://github.com/hbllm/hbllm-core
repo_name: hbllm/hbllm-core
edit_uri: edit/master/core/docs/

copyright: Copyright &copy; 2024–2026 HBLLM Team — GNU GPLv3 License

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/brain
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hbllm/hbllm-core
      name: HBLLM on GitHub
  generator: false
  opengraph:
    image: assets/social_preview.png
    description: A sovereign personal AI ecosystem that runs entirely on your own hardware.
  twitter:
    card: summary_large_image
    site: hbllm_core
    creator: hbllm_team

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/sorts/tablesort.number.min.js

