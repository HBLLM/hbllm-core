site_name: HBLLM Core — Cognitive AI That Runs Without Massive GPU
site_description: >-
  Open-source AGI framework that runs without massive GPU or VRAM.
  25+ cognitive nodes, multi-tiered memory, Rust SIMD inference,
  and dynamic LoRA routing. Deploy autonomous AI agents on
  Raspberry Pi, laptops, and edge devices — no expensive hardware required.
site_author: HBLLM Team
site_url: https://hbllm.github.io/hbllm-core/
repo_url: https://github.com/hbllm/hbllm-core
repo_name: hbllm/hbllm-core
edit_uri: edit/master/core/docs/

copyright: Copyright &copy; 2024–2026 HBLLM Team — GNU GPLv3 License

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/brain
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hbllm/hbllm-core
      name: HBLLM on GitHub
  generator: false
  opengraph:
    image: assets/social_preview.png
    description: Open-source AGI framework with 25+ cognitive nodes, multi-tiered memory, and Rust-accelerated inference.
  twitter:
    card: summary_large_image
    site: hbllm_core
    creator: hbllm_team

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/sorts/tablesort.number.min.js

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Cognitive Nodes: architecture/cognitive-nodes.md
      - Sleep Cycle: architecture/sleep-cycle.md
      - Message Bus: architecture/message-bus.md
      - Memory Systems: architecture/memory-systems.md
      - Network Resilience: architecture/network-resilience.md
  - Zoning Model:
      - How It Works: zoning/how-it-works.md
      - LoRA Routing: zoning/lora-routing.md
      - Weighted Domains: zoning/weighted-domains.md
      - Hybrid Quantization: zoning/hybrid-quantization.md
  - Guides:
      - Quick Start: guides/quickstart.md
      - Configuration: guides/configuration.md
      - Custom Nodes: guides/custom-nodes.md
      - Plugin SDK: guides/plugins.md
      - Training Pipeline: guides/training.md
      - Robotics & IoT: guides/robotics-iot.md
      - Deployment: guides/deployment.md
  - API Reference:
      - Brain Factory: api/brain-factory.md
      - Brain Subsystems: api/brain-subsystems.md
      - Actions & Tools: api/actions.md
      - Governance & Security: api/governance.md
      - Memory: api/memory.md
      - Plugin System: api/plugins.md
      - Model Internals: api/model.md
      - Serving & REST API: api/serving.md
      - Tokenizer: api/tokenizer.md
      - Network: api/network.md
      - Data Pipeline: api/data-pipeline.md
      - Benchmarks & Profiling: api/benchmarks.md
      - Rust Kernels: api/rust-kernels.md
  - Contributing: contributing.md
