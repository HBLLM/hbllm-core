# ─────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy / Load Balancer for HBLLM Production
# ─────────────────────────────────────────────────────────────────────
# Used by: docker-compose.prod.yml
# Proxies to Docker Compose service "hbllm-core" (round-robin across replicas)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ── Logging ────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Rate Limiting (Nginx-level defense) ────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=health:1m rate=10r/s;

    # ── Upstream (Docker Compose service name) ─────────────────────────
    upstream hbllm_backend {
        least_conn;
        server hbllm-core:8000;
        keepalive 32;
    }

    # ── Server ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ───────────────────────────────────────────
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "default-src 'self'; frame-ancestors 'none'" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

        # Remove server version header
        server_tokens off;

        # ── Health checks (high rate, no logging) ──────────────────────
        location /health {
            limit_req zone=health burst=20 nodelay;
            access_log off;
            proxy_pass http://hbllm_backend;
            proxy_set_header Host $host;
        }

        # ── Metrics (internal only in production) ──────────────────────
        location /metrics {
            # Restrict to internal networks
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            proxy_pass http://hbllm_backend;
            proxy_set_header Host $host;
        }

        # ── API endpoints ──────────────────────────────────────────────
        location / {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://hbllm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # WebSocket support (for streaming/chat)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    120s;
        }

        # ── Error pages ────────────────────────────────────────────────
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"HBLLM service is temporarily unavailable"}';
        }
    }
}
